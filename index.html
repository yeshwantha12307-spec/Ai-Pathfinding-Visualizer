<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Pathfinding Visualizer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>AI Pathfinding Visualizer</h1>

<div class="controls">

<button onclick="setMode('start')">Start</button>
<button onclick="setMode('goal')">Goal</button>
<button onclick="setMode('wall')">Wall</button>
<button onclick="setMode('erase')">Remove Wall</button>

<select id="algorithm">
<option value="bfs">BFS</option>
<option value="dfs">DFS</option>
<option value="astar">A*</option>
</select>

<select onchange="setSpeed(this.value)">
<option value="5">Fast</option>
<option value="20" selected>Medium</option>
<option value="80">Slow</option>
</select>

<button onclick="runAlgorithm()">Run AI</button>
<button onclick="generateMaze()">Maze</button>
<button onclick="clearGrid()">Clear</button>

</div>

<div id="grid"></div>

<script src="script.js"></script>

</body>
</html>
